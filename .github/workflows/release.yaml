name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
      - name: Build sdist and wheel
        run: uv build
      # TODO: migrate to PyPI trusted publishing (https://docs.pypi.org/trusted-publishers/)
      # and drop the token secret.
      - name: Publish to PyPI
        run: uv publish --token "$PYPI_API_TOKEN"
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-rc* ]]; then
            gh release create "${GITHUB_REF_NAME}" dist/* --generate-notes --prerelease
          else
            gh release create "${GITHUB_REF_NAME}" dist/* --generate-notes --draft
          fi
